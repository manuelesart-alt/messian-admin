<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESSIAN Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0a0a;color:#f0ede6;
display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock{text-align:center;max-width:380px;padding:40px}
.lock h1{font-size:20px;letter-spacing:3px;margin-bottom:8px;font-weight:400}
.lock p{font-size:13px;color:#8a8780;margin-bottom:32px}
.lock .icon{font-size:48px;margin-bottom:24px;opacity:.6}
.lock input{width:100%;padding:14px 20px;background:#141414;border:1px solid rgba(201,169,110,.2);
border-radius:10px;color:#f0ede6;font-size:15px;text-align:center;outline:none;
letter-spacing:2px;transition:border-color .3s}
.lock input:focus{border-color:#c9a96e}
.lock button{width:100%;margin-top:16px;padding:14px;background:#c9a96e;color:#0a0a0a;
border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
letter-spacing:1px;transition:background .2s}
.lock button:hover{background:#dbbf8a}
.lock .err{color:#f87171;font-size:13px;margin-top:14px;min-height:20px}
</style>
</head>
<body>
<div class="lock">
<div class="icon">&#x1f512;</div>
<h1>MESSIAN ADMIN</h1>
<p>Enter password to access the admin panel</p>
<input type="password" id="pw" placeholder="Password" autofocus>
<button onclick="unlock()">Enter</button>
<div class="err" id="err"></div>
</div>

const IT=100000;
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
async function unlock(){
const pw=document.getElementById("pw").value;
if(!pw)return;
try{
const raw=Uint8Array.from(atob(D),c=>c.charCodeAt(0));
const salt=raw.slice(0,16);
const iv=raw.slice(16,28);
const ct=raw.slice(28);
const enc=new TextEncoder();
const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
const key=await crypto.subtle.deriveKey(
{name:"PBKDF2",salt,iterations:IT,hash:"SHA-256"},
keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
const html=new TextDecoder().decode(dec);
document.open();document.write(html);document.close();
}catch(e){document.getElementById("err").textContent="Wrong password"}
}
